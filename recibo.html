<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Ticket — Tiketes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#07070F}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:60px;-webkit-font-smoothing:antialiased;
}

/* Top bar */
.topbar{
  width:100%;padding:20px 20px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:24px;
}
.topbar-brand{font-size:13px;font-weight:700;letter-spacing:.10em;color:rgba(255,255,255,.38);text-transform:uppercase;}
.topbar-tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;letter-spacing:.04em;transition:all .3s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);}
.topbar-tag.ready{background:rgba(34,197,94,.15);color:#4ADE80;}
.topbar-tag.error{background:rgba(239,68,68,.14);color:#F87171;}

/* Status success */
.status{display:flex;flex-direction:column;align-items:center;padding:0 24px 24px;gap:12px;opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s;}
.status.show{opacity:1;transform:translateY(0)}
.status-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#22C55E,#16A34A);box-shadow:0 14px 36px rgba(34,197,94,.38);}
.status-icon svg{width:30px;height:30px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.status-title{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.04em;text-align:center;}
.status-sub{font-size:13px;color:rgba(255,255,255,.40);text-align:center;line-height:1.55;max-width:280px;}

/* Paper — mismo look que el ticket térmico de la app */
.paper-outer{width:calc(100% - 32px);max-width:380px;margin:0 16px;opacity:0;transform:translateY(16px);transition:opacity .5s .15s,transform .5s .15s;}
.paper-outer.show{opacity:1;transform:translateY(0)}
.paper{
  background:#fff;border-radius:6px;
  padding:22px 20px;color:#000;position:relative;overflow:hidden;
  box-shadow:0 28px 72px rgba(0,0,0,.48);
  font-family:'Courier New',Courier,monospace;
}
.paper .store{text-align:center;font-size:18px;font-weight:800;margin-bottom:2px;}
.paper .slogan{text-align:center;font-size:10px;color:#444;margin-bottom:2px;font-style:italic;}
.paper .addr{text-align:center;font-size:10.5px;margin-bottom:1px;color:#222;}
.paper .meta{text-align:center;font-size:11px;margin-top:6px;margin-bottom:8px;}
.paper .meta strong{display:block;font-size:12px;}
.paper .cust{text-align:center;font-size:11.5px;margin-bottom:6px;font-weight:700;}
.paper .sep{border-top:1px dashed #000;margin:8px 0;}
.paper table{width:100%;border-collapse:collapse;}
.paper td{font-size:12px;padding:3px 0;vertical-align:top;}
.paper td.a{text-align:right;white-space:nowrap;padding-left:8px;}
.paper .q{color:#444;font-size:10px;}
.paper .totrow td{font-size:15px;font-weight:800;padding-top:6px;}
.paper .paytag{text-align:center;font-size:11px;margin-top:6px;padding:3px 0;border:1px solid #000;font-weight:700;}
.paper .fiado{border:2px solid #000;padding:8px;margin-top:8px;text-align:center;}
.paper .fiado-title{font-size:14px;font-weight:800;letter-spacing:1px;}
.paper .fiado-sub{font-size:10.5px;margin-top:4px;}
.paper .foot{text-align:center;font-size:10.5px;margin-top:10px;color:#333;line-height:1.45;}
.paper .thanks{text-align:center;font-size:12px;font-weight:700;margin-top:8px;}
.paper .social{text-align:center;font-size:10.5px;color:#333;margin-top:4px;font-weight:600;}
.paper .legal{text-align:center;font-size:9px;color:#555;margin-top:8px;padding:4px;border-top:1px dashed #aaa;line-height:1.4;}
.paper .brand{text-align:center;font-size:9px;color:#666;margin-top:6px;letter-spacing:1px;}
.paper .wmwrap{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none;}
.paper .wmline{position:absolute;left:-30px;transform:rotate(-18deg);font-size:15px;font-weight:800;color:rgba(0,0,0,0.09);white-space:nowrap;letter-spacing:2px;}
.paper .content{position:relative;z-index:1;}

/* Download button */
.btn-dl{display:flex;align-items:center;justify-content:center;gap:10px;width:calc(100% - 32px);max-width:380px;margin:18px 16px 0;padding:16px;background:#fff;border:0;border-radius:16px;cursor:pointer;font-size:15px;font-weight:700;color:#0F0F28;letter-spacing:-.02em;box-shadow:0 8px 28px rgba(0,0,0,.28);-webkit-tap-highlight-color:transparent;opacity:0;transform:translateY(12px);transition:opacity .4s .3s,transform .4s .3s;}
.btn-dl.show{opacity:1;transform:translateY(0)}
.btn-dl:active{opacity:.8;transform:scale(.97)}

.err{color:rgba(255,255,255,.44);text-align:center;padding:64px 32px;max-width:320px;}
.err h2{font-size:20px;color:#fff;margin-bottom:8px;font-weight:700}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Tiketes</span>
  <span class="topbar-tag" id="tag">Cargando…</span>
</div>

<div class="status" id="statusEl">
  <div class="status-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
  <div class="status-title">¡Ticket guardado!</div>
  <div class="status-sub">Tu comprobante se guardó en tu galería. Puedes compartirlo cuando quieras.</div>
</div>

<div id="paperWrap"></div>

<button class="btn-dl" id="btnDl" onclick="downloadNow()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  <span id="btnLabel">Guardar ticket</span>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(n){return '$'+Number(n||0).toFixed(2);}
function $(id){return document.getElementById(id);}

var raw=new URLSearchParams(location.search).get('d');
var d=null;
try{d=JSON.parse(raw||'');}catch(e){}

var tag=$('tag'),statusEl=$('statusEl'),paperWrap=$('paperWrap'),btnDl=$('btnDl');

if(!d||d.T==null){
  paperWrap.innerHTML='<div class="err"><h2>Comprobante no encontrado</h2><p>El enlace no es válido o ya expiró. Pide al negocio que genere el QR de nuevo.</p></div>';
  tag.textContent='Inválido';tag.className='topbar-tag error';
  btnDl.style.display='none';
}else{
  renderPaper();
  generatePNG().then(function(blob){
    if(blob){_blob=blob;triggerDownload(blob);}
    showSuccess();
  });
}

function qtyLabel(it){
  if(it.u==='kg'){
    var q=Number(it.q||0);
    if(q>=1){return q.toFixed(q%1===0?0:3)+' kg';}
    return Math.round(q*1000)+' g';
  }
  return (it.q)+'×';
}
function priceLabel(it){return it.u==='kg'?('$'+Number(it.p||0).toFixed(2)+'/kg'):('$'+Number(it.p||0).toFixed(2));}

function payLabel(pm){
  if(pm==='efectivo')return 'EFECTIVO';
  if(pm==='credito'||pm==='tarjeta')return 'TARJETA';
  if(pm==='transferencia')return 'TRANSFERENCIA';
  return 'PAGO';
}

function renderPaper(){
  var items=Array.isArray(d.i)?d.i:[];
  var rows=items.map(function(it){
    return '<tr><td class="n">'+esc(it.n)+'<br/><span class="q">'+qtyLabel(it)+' '+priceLabel(it)+'</span></td>'
      +'<td class="a">'+fmt(Number(it.q||0)*Number(it.p||0))+'</td></tr>';
  }).join('');

  var totals='<tr><td>Subtotal</td><td class="a">'+fmt(d.st!=null?d.st:d.T)+'</td></tr>';
  if(d.x)  totals+='<tr><td>IVA</td><td class="a">'+fmt(d.x)+'</td></tr>';
  if(d.ds) totals+='<tr><td>Descuento</td><td class="a">-'+fmt(d.ds)+'</td></tr>';
  if(d.tp) totals+='<tr><td>Propina</td><td class="a">'+fmt(d.tp)+'</td></tr>';
  totals+='<tr class="totrow"><td>TOTAL</td><td class="a">'+fmt(d.T)+'</td></tr>';

  var paytag = d.cr?'':'<div class="paytag">'+payLabel(d.pm)+'</div>';

  var payBlock='';
  if(d.cr){
    payBlock='<div class="fiado"><div class="fiado-title">FIADO · PENDIENTE A PAGAR</div>'
      +(d.cn?'<div class="fiado-sub">Cliente: '+esc(d.cn)+'</div>':'')
      +'<div class="fiado-sub">Conserva esta nota como comprobante de tu adeudo.</div></div>';
  }else if(d.pa!=null){
    payBlock='<table><tr><td>Pagó</td><td class="a">'+fmt(d.pa)+'</td></tr>'
      +'<tr><td>Cambio</td><td class="a">'+fmt(d.ca||0)+'</td></tr></table>';
  }

  var wm='';
  if(d.wm){
    for(var i=0;i<12;i++){wm+='<div class="wmline" style="top:'+(50+i*74)+'px">TIKETES · TIKETES · TIKETES · TIKETES</div>';}
    wm='<div class="wmwrap">'+wm+'</div>';
  }

  var thanks = d.cr ? 'Te esperamos para liquidar' : esc(d.fo||'¡Gracias por tu compra!');

  var html='<div class="paper-outer" id="paperOuter"><div class="paper" id="paper">'
    + wm
    + '<div class="content">'
    + '<div class="store">'+esc((d.s||'Tienda').toUpperCase())+'</div>'
    + (d.h?'<div class="slogan">'+esc(d.h)+'</div>':'')
    + (d.ad?'<div class="addr">'+esc(d.ad)+'</div>':'')
    + (d.ph?'<div class="addr">Tel: '+esc(d.ph)+'</div>':'')
    + '<div class="meta"><strong>Venta #'+esc(d.f)+'</strong>'+esc(d.d)+' · '+esc(d.t)+'</div>'
    + ((d.cn&&!d.cr)?'<div class="cust">Cliente: '+esc(d.cn)+'</div>':'')
    + '<div class="sep"></div>'
    + '<table>'+rows+'</table>'
    + '<div class="sep"></div>'
    + '<table>'+totals+'</table>'
    + paytag
    + payBlock
    + '<div class="sep"></div>'
    + '<div class="foot">'+items.length+' '+(items.length===1?'producto':'productos')+'</div>'
    + '<div class="thanks">'+thanks+'</div>'
    + (d.so?'<div class="social">'+esc(d.so)+'</div>':'')
    + (d.lg?'<div class="legal">'+esc(d.lg).replace(/\n/g,'<br/>')+'</div>':'')
    + (d.wm?'<div class="brand">VÍA TIKETES</div>':'')
    + '</div></div></div>';

  paperWrap.innerHTML=html;
  requestAnimationFrame(function(){requestAnimationFrame(function(){$('paperOuter').classList.add('show');});});
}

function generatePNG(){
  return new Promise(function(resolve){
    if(typeof html2canvas!=='function'){resolve(null);return;}
    var el=$('paper');
    if(!el){resolve(null);return;}
    html2canvas(el,{scale:2,backgroundColor:'#ffffff',logging:false,useCORS:true}).then(function(canvas){
      canvas.toBlob(function(b){resolve(b);},'image/png');
    }).catch(function(){resolve(null);});
  });
}

var _blob=null;
function triggerDownload(blob){
  var store=(d.s||'Tiketes').replace(/[^\wÀ-ɏ]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  var fname='Ticket-'+store+'-'+d.f+'.png';
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},4000);
}
function downloadNow(){
  if(_blob){triggerDownload(_blob);}
  else{
    generatePNG().then(function(b){
      if(b){_blob=b;triggerDownload(b);}
      else{alert('Para guardar tu ticket, toma una captura de pantalla.');}
    });
  }
}

function showSuccess(){
  tag.textContent='Listo ✓';tag.className='topbar-tag ready';
  statusEl.classList.add('show');
  btnDl.classList.add('show');
  if(!_blob){$('btnLabel').textContent='Toma captura de pantalla';}
}
</script>
</body>
</html>
