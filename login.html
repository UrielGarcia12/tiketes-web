<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Iniciar sesión — Tiketes</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#07070F">
<meta name="description" content="Inicia sesión en tu cuenta de Tiketes con tu correo y contraseña."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="colors_and_type.css">
<style>
/* ════════════════════════════════════════════════════════════════
   Mismos tokens que la app (src/constants/colors.ts + Fonts).
   Fondo #050617, orbes violeta+oro, inputs r14, CTA r18 con glow.
   ════════════════════════════════════════════════════════════════ */
:root{
  --ink950:#050617; --ink900:#0A0B1F;
  --violet500:#6B4BFF; --violet700:#4524D6; --violet300:#A88EFF; --violet400:#8B70FF;
  --gold:#F5C518;
  --f-display:'Sora',system-ui,sans-serif;
  --f-body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink950);color:#fff;font-family:var(--f-body);
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;align-items:center;padding:0 18px 56px;
}
/* Orbes de fondo — mismos colores/posiciones que SignupScreen */
.orb{position:fixed;border-radius:999px;pointer-events:none;z-index:0;filter:blur(38px)}
.orb-a{top:-90px;left:-70px;width:300px;height:300px;background:rgba(107,75,255,.45)}
.orb-b{top:260px;right:-90px;width:250px;height:250px;background:rgba(245,197,24,.18)}
.orb-c{bottom:-120px;left:10%;width:260px;height:260px;background:rgba(107,75,255,.22)}

/* Barra */
.bar{width:100%;max-width:560px;display:flex;align-items:center;justify-content:space-between;padding:20px 2px 22px;position:relative;z-index:2}
.bar a{font-family:var(--f-body);font-size:13px;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;transition:color .16s}
.bar a:hover{color:#fff}
.brand{display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.brand-mark{height:24px;width:auto;display:block}
.brand-name{font-family:var(--f-display);font-weight:800;font-size:17px;color:#fff;letter-spacing:-.035em}

/* Tarjeta */
.card{width:100%;max-width:560px;position:relative;z-index:2}

.eyebrow{
  font-family:var(--f-body);font-size:10.5px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--violet300);margin-bottom:10px;
}
h1{font-family:var(--f-display);font-weight:800;font-size:clamp(26px,4.6vw,34px);letter-spacing:-.6px;line-height:1.15}
h1 .ac{color:var(--violet300)}
.sub{font-family:var(--f-body);font-size:13.5px;color:rgba(255,255,255,.55);margin-top:7px;line-height:1.55}

/* Campos — input r14, bg .05, borde .10, Inter 14 (idéntico a la app) */
.field{margin-bottom:15px}
.lb{
  display:block;font-family:var(--f-body);font-size:10.5px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.66);margin-bottom:7px;
}
input[type=text],input[type=email],input[type=password],input[type=tel]{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);border-radius:14px;
  padding:13px 14px;font-family:var(--f-body);font-size:14px;color:#fff;
  transition:border-color .18s,background .18s;
}
input::placeholder{color:rgba(255,255,255,.28)}
input:focus{outline:none;border-color:rgba(167,142,255,.72);background:rgba(139,112,255,.10)}
input:focus-visible{outline:none}

/* Contraseña con botón de ver. Sin esto el usuario no puede comprobar qué
   escribió — y si Chrome autocompleta una contraseña generada, se entera
   hasta que la app lo rechaza. */
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:50px}
.pwd-eye{
  position:absolute;right:5px;top:50%;transform:translateY(-50%);
  background:none;border:0;cursor:pointer;padding:9px 10px;border-radius:10px;
  color:rgba(255,255,255,.4);display:flex;transition:color .18s,background .18s;
}
.pwd-eye:hover{color:#fff;background:rgba(255,255,255,.07)}
.pwd-eye:focus-visible{outline:2px solid var(--violet300);outline-offset:1px}
.pwd-eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* Botones — CTA r18 con degradado violeta + glow (idéntico a la app) */
.actions{display:flex;gap:10px;margin-top:20px}
.btn{
  border:0;border-radius:18px;padding:15px 18px;cursor:pointer;
  font-family:var(--f-body);font-weight:700;font-size:14.5px;
  transition:transform .12s,opacity .16s,background .16s;
}
.btn:active{transform:scale(.98)}
.btn-primary{
  flex:1;background:linear-gradient(90deg,var(--violet400),var(--violet700));
  color:#fff;box-shadow:0 12px 20px rgba(107,75,255,.42);
}
.btn-primary:hover{opacity:.94}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.72);flex:0 0 auto}
.btn-ghost:hover{background:rgba(255,255,255,.1)}

.msg{font-family:var(--f-body);font-size:12.5px;line-height:1.5;margin-top:14px;padding:11px 13px;border-radius:12px}
.msg.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
.msg.ok{background:rgba(52,199,89,.12);border:1px solid rgba(52,199,89,.3);color:#86EFAC}

.foot{text-align:center;margin-top:20px;font-family:var(--f-body);font-size:12.5px;color:rgba(255,255,255,.35)}
.foot a{color:var(--violet300);text-decoration:none}

/* Entrada */
.rise{opacity:0;transform:translateY(14px);animation:rise .55s cubic-bezier(.16,1,.3,1) forwards}
@keyframes rise{to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.rise{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="orb orb-a"></div>
<div class="orb orb-b"></div>
<div class="orb orb-c"></div>

<div class="bar">
  <a href="/">← Volver</a>
  <span class="brand">
    <img src="assets/logo-mark-web.png" alt="" class="brand-mark" width="195" height="256">
    <span class="brand-name">Tiketes</span>
  </span>
</div>

<main class="card" style="max-width:420px;margin:0 auto">
  <div class="eyebrow">Panel</div>
  <h1>Inicia <span class="ac">sesión</span></h1>
  <p class="sub">Entra con el mismo correo y contraseña de tu app.</p>
  <div class="field">
    <label class="lb" for="email">Correo</label>
    <input id="email" type="email" autocomplete="email" placeholder="tucorreo@ejemplo.com" maxlength="120">
  </div>
  <div class="field">
    <label class="lb" for="pwd">Contraseña</label>
    <div class="pwd-wrap">
      <input id="pwd" type="password" autocomplete="current-password" placeholder="Tu contraseña" maxlength="72">
      <button type="button" class="pwd-eye" id="eye" aria-label="Ver contraseña"></button>
    </div>
  </div>
  <div id="msg"></div>
  <div class="actions"><button class="btn btn-primary" id="submit">Entrar</button></div>
  <button class="btn btn-ghost" id="google" style="margin-top:10px;width:100%">Entrar con Google</button>
  <p class="foot">¿No tienes cuenta? <a href="crear-cuenta.html">Crear una</a></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SUPABASE_URL='https://wwukfbadzhowpvruumrp.supabase.co';
var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3dWtmYmFkemhvd3B2cnV1bXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDk1MjksImV4cCI6MjA5NDcyNTUyOX0.2-cPfqjoEkFkzVcWEvIzQHL4SWbvdJnNlCeUSEyzXk8';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
var $=function(id){return document.getElementById(id)};
function showErr(t){$('msg').innerHTML=t?('<div class="msg err">'+t+'</div>'):''}
// Si ya hay sesión, saltar directo al panel.
sb.auth.getSession().then(function(r){ if(r.data.session) location.replace('panel/'); });
$('eye').addEventListener('click',function(){var i=$('pwd');i.type=i.type==='password'?'text':'password';i.focus();});
$('submit').addEventListener('click',async function(){
  showErr('');
  var email=$('email').value.trim().toLowerCase(), pwd=$('pwd').value;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){showErr('Escribe un correo válido.');return}
  if(!pwd){showErr('Escribe tu contraseña.');return}
  var b=$('submit');b.disabled=true;b.textContent='Entrando…';
  var r=await sb.auth.signInWithPassword({email:email,password:pwd});
  b.disabled=false;b.textContent='Entrar';
  if(r.error){
    var m=r.error.message||'';
    showErr(/invalid login|credentials/i.test(m)?'Correo o contraseña incorrectos.':
            /confirm/i.test(m)?'Confirma tu correo antes de entrar.':
            /rate|seconds/i.test(m)?'Espera un momento e intenta de nuevo.':m);
    return;
  }
  location.replace('panel/');
});
$('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')$('submit').click()});
$('google').addEventListener('click',async function(){
  showErr('');
  var r=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: location.origin + '/panel/' }
  });
  if(r.error) showErr('No pudimos abrir Google. Intenta de nuevo.');
});
</script>
<!-- Cloudflare Web Analytics (sin cookies) --><script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "3535288e08fe4b08ac9c4b4633385ee7"}'></script>
</body>
</html>
