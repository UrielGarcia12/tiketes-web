<!doctype html><html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
/* Alta de producto — réplica de AddProductScreen: escanear → nombre →
   precio → categoría → foto. El código de barras llena el resto solo.      */
.stage{background:linear-gradient(180deg,#EEEEF5 0%,#F7F7FB 100%);padding:24px;border-radius:18px;display:flex;justify-content:center;align-items:flex-start}
.phone{position:relative;width:340px;height:720px;border-radius:32px;background:#F7F7FB;overflow:hidden;box-shadow:0 28px 64px rgba(15,15,40,.18);display:flex;flex-direction:column}

.head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
.head .ic{width:34px;height:34px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(15,15,40,.05)}
.head .t{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink-900)}

.body{flex:1;padding:4px 16px;overflow:hidden}

/* Escanear (atajo destacado) */
.scan{
  background:linear-gradient(135deg,#15152A,#0A0B1F);border-radius:18px;padding:15px;
  display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;
}
.scan::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;border-radius:50%;background:radial-gradient(closest-side,rgba(107,75,255,.4),transparent)}
.scan .bx{width:42px;height:42px;border-radius:13px;background:rgba(139,112,255,.22);display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.scan .in{position:relative;z-index:1}
.scan .t{font-family:var(--font-display);font-weight:700;font-size:13.5px;color:#fff}
.scan .d{font-family:var(--font-body);font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.scan .chip{position:relative;z-index:1;margin-left:auto;background:rgba(245,197,24,.2);color:#F5C518;font-family:var(--font-body);font-weight:700;font-size:8px;padding:3px 8px;border-radius:99px;letter-spacing:.05em}

.lb{font-family:var(--font-body);font-weight:600;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--fg-muted);margin:14px 0 6px}
.inp{background:#fff;border:1px solid #EEEEF5;border-radius:14px;padding:12px 13px;font-family:var(--font-body);font-size:13.5px;color:var(--ink-900);box-shadow:0 1px 2px rgba(15,15,40,.04)}
.inp.ph{color:#B9B9C6}
.inp.on{border-color:rgba(107,75,255,.5);box-shadow:0 0 0 3px rgba(107,75,255,.09)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.inp .u{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-left:3px}

/* Categorías */
.cats{display:flex;gap:6px;flex-wrap:wrap}
.ct{background:#fff;border:1px solid #EEEEF5;border-radius:99px;padding:7px 11px;font-family:var(--font-body);font-weight:600;font-size:10.5px;color:var(--ink-800);display:inline-flex;align-items:center;gap:5px}
.ct.on{background:#F2EEFF;border-color:rgba(107,75,255,.45);color:var(--violet-700)}

/* Foto */
.photo{display:flex;gap:9px;margin-top:6px}
.ph{
  flex:1;background:#fff;border:1px dashed #DCDCE8;border-radius:14px;padding:14px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.ph .em{font-size:19px}
.ph .t{font-family:var(--font-body);font-weight:600;font-size:10px;color:var(--fg-muted)}

.cta{margin:auto 16px 18px;border-radius:16px;padding:14px;text-align:center;background:linear-gradient(90deg,#8B70FF,#4524D6);color:#fff;font-family:var(--font-body);font-weight:700;font-size:14px;box-shadow:0 12px 24px rgba(107,75,255,.42)}
</style></head>
<body><div class="stage"><div class="phone">

  <div class="head">
    <div class="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0A0B1F" stroke-width="2.4" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="t">Nuevo producto</div>
    <div class="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0A0B1F" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>

  <div class="body">
    <div class="scan">
      <div class="bx"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A88EFF" stroke-width="2.2" stroke-linecap="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></div>
      <div class="in">
        <div class="t">Escanea el código</div>
        <div class="d">Llenamos el nombre por ti</div>
      </div>
      <div class="chip">MÁS RÁPIDO</div>
    </div>

    <div class="lb">Nombre del producto</div>
    <div class="inp on">Coca Cola 600ml</div>

    <div class="two">
      <div>
        <div class="lb">Precio de venta</div>
        <div class="inp">$18.00</div>
      </div>
      <div>
        <div class="lb">Stock inicial</div>
        <div class="inp">24 <span class="u">pzas</span></div>
      </div>
    </div>

    <div class="lb">Categoría</div>
    <div class="cats">
      <div class="ct on">🥤 Bebidas</div>
      <div class="ct">🛒 Abarrotes</div>
      <div class="ct">🍪 Snacks</div>
      <div class="ct">🥛 Lácteos</div>
      <div class="ct">＋ Nueva</div>
    </div>

    <div class="lb">Foto <span style="text-transform:none;letter-spacing:0;font-weight:500">— opcional</span></div>
    <div class="photo">
      <div class="ph"><div class="em">📷</div><div class="t">Tomar foto</div></div>
      <div class="ph"><div class="em">🖼️</div><div class="t">Elegir de galería</div></div>
    </div>
  </div>

  <div class="cta">Guardar producto</div>
</div></div></body></html>
