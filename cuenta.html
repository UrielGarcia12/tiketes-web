<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mi membresía — Tiketes</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#050617">
<meta name="description" content="Tu membresía de Tiketes: plan actual y estado."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="colors_and_type.css">
<style>
:root{
  --ink950:#050617;
  --violet500:#6B4BFF; --violet400:#8B70FF; --violet300:#A88EFF; --violet700:#4524D6;
  --gold:#F5C518;
  --f-display:'Sora',system-ui,sans-serif;
  --f-body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink950);color:#fff;font-family:var(--f-body);min-height:100dvh;width:100%;max-width:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;visibility:hidden}
img{max-width:100%;height:auto;display:block}

.orb{position:fixed;border-radius:999px;pointer-events:none;z-index:0;filter:blur(8px)}
.orb1{top:-120px;left:-80px;width:320px;height:320px;background:rgba(107,75,255,.45);opacity:.5}
.orb2{bottom:-160px;right:-90px;width:340px;height:340px;background:rgba(245,197,24,.10);opacity:.6}

/* Barra superior */
.top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:16px clamp(16px,4vw,32px);border-bottom:1px solid rgba(255,255,255,.07)}
.brand{display:inline-flex;align-items:center;gap:9px;text-decoration:none}
.brand img{height:24px;width:auto}
.brand b{font-family:var(--f-display);font-weight:800;font-size:17px;letter-spacing:-.035em}
.logout{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:9px 14px;cursor:pointer;font-family:var(--f-body);font-weight:600;font-size:13px;color:rgba(255,255,255,.75)}
.logout:hover{background:rgba(255,255,255,.11);color:#fff}

.wrap{position:relative;z-index:2;width:100%;max-width:520px;margin:0 auto;padding:clamp(28px,5vw,52px) 20px 60px}
.hello{font-size:13px;color:rgba(255,255,255,.5)}
.hello b{color:#fff}
h1{font-family:var(--f-display);font-weight:800;font-size:clamp(26px,5vw,36px);letter-spacing:-.02em;margin:6px 0 22px}

/* Tarjeta de membresía */
.mcard{border-radius:22px;padding:24px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,color-mix(in srgb,var(--ac) 18%,#0C0C1A),#0A0B1F);
  border:1px solid color-mix(in srgb,var(--ac) 34%,transparent);
  box-shadow:0 16px 40px -16px color-mix(in srgb,var(--ac) 50%,transparent);
}
.mcard-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.plan-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-display);font-weight:800;font-size:22px;color:#fff}
.plan-dot{width:12px;height:12px;border-radius:50%;background:var(--ac);box-shadow:0 0 14px var(--ac)}
.status-pill{font-family:var(--f-body);font-weight:700;font-size:11px;letter-spacing:.4px;text-transform:uppercase;padding:5px 11px;border-radius:99px;
  color:var(--ac);background:color-mix(in srgb,var(--ac) 16%,transparent);border:1px solid color-mix(in srgb,var(--ac) 34%,transparent)}
.mcard-msg{font-family:var(--f-body);font-size:14px;color:rgba(255,255,255,.72);line-height:1.55;margin-top:16px}
.mcard-msg b{color:#fff;font-weight:600}
.mcard-rule{height:1px;background:rgba(255,255,255,.10);margin:20px 0}
.mrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0}
.mrow span{color:rgba(255,255,255,.5)}
.mrow b{color:#fff;font-family:var(--f-body);font-weight:600}

/* Acciones */
.actions{display:flex;flex-direction:column;gap:10px;margin-top:22px}
.btn{border:0;border-radius:15px;padding:15px;cursor:pointer;font-family:var(--f-display);font-weight:700;font-size:15px;text-align:center;text-decoration:none;display:block}
.btn-primary{background:linear-gradient(90deg,var(--violet400),var(--violet700));color:#fff;box-shadow:0 8px 18px rgba(107,75,255,.4)}
.btn-primary:hover{filter:brightness(1.05)}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:#fff}

.loading{text-align:center;color:rgba(255,255,255,.5);padding:60px 0;font-size:14px}
</style>
</head>

<div class="orb orb1"></div><div class="orb orb2"></div>

<header class="top">
  <a class="brand" href="/"><img src="assets/logo-mark-web.png" alt=""><b>Tiketes</b></a>
  <button class="logout" onclick="salir()">Salir</button>
</header>

<div class="wrap" id="wrap">
  <div class="loading" id="loading">Cargando tu membresía…</div>
  <div id="content" style="display:none">
    <div class="hello">Hola, <b id="uname">—</b></div>
    <h1>Mi membresía</h1>

    <div class="mcard" id="mcard">
      <div class="mcard-top">
        <span class="plan-badge"><span class="plan-dot"></span><span id="planName">—</span></span>
        <span class="status-pill" id="statusPill">—</span>
      </div>
      <p class="mcard-msg" id="planMsg">—</p>
      <div id="detailBlock" style="display:none">
        <div class="mcard-rule"></div>
        <div class="mrow"><span id="dateLabel">Renueva</span><b id="dateVal">—</b></div>
      </div>
    </div>

    <div class="actions" id="actions"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SUPABASE_URL='https://wwukfbadzhowpvruumrp.supabase.co';
var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3dWtmYmFkemhvd3B2cnV1bXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDk1MjksImV4cCI6MjA5NDcyNTUyOX0.2-cPfqjoEkFkzVcWEvIzQHL4SWbvdJnNlCeUSEyzXk8';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
var $=function(id){return document.getElementById(id)};

var PLAN_NAME={free:'Free',essential:'Essential',pro:'Pro',premium:'Premium'};
var PLAN_AC={free:'#22C55E',essential:'#0EA5E9',pro:'#8B70FF',premium:'#F5C518'};

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'});}catch(e){return '';}}

async function salir(){try{await sb.auth.signOut();}catch(e){}location.replace('login.html');}

(async function(){
  // Guard: sin sesión, al login (nada se ve — body oculto hasta confirmar).
  var s=await sb.auth.getSession();
  if(!s.data.session){location.replace('login.html');return;}
  document.body.style.visibility='visible';
  var uid=s.data.session.user.id;
  var email=s.data.session.user.email||'';
  // Portal de Polar: ahí el usuario cancela, cambia de plan, actualiza tarjeta.
  var portalUrl='https://polar.sh/tiketes/portal'+(email?('?email='+encodeURIComponent(email)):'');

  // Perfil (nombre + plan) — RLS: sólo el propio.
  var pr=await sb.from('profiles').select('full_name,store_name,plan').eq('id',uid).maybeSingle();
  var prof=pr.data||{};
  var name=prof.store_name||prof.full_name||s.data.session.user.email||'tu negocio';
  var plan=(prof.plan||'free');
  if(!PLAN_NAME[plan])plan='free';

  // Suscripción Polar activa (misma consulta que la app).
  var su=await sb.from('polar_customers').select('status,current_period_end,cancel_at_period_end')
    .eq('user_id',uid).neq('status','revoked').order('updated_at',{ascending:false}).limit(1).maybeSingle();
  var sub=su.data;

  $('uname').textContent=name;
  var ac=PLAN_AC[plan];
  $('mcard').style.setProperty('--ac',ac);
  document.documentElement.style.setProperty('--ac',ac);
  $('planName').textContent='Plan '+PLAN_NAME[plan];

  var actions=$('actions');
  if(plan==='free'){
    $('statusPill').textContent='Gratis';
    $('planMsg').innerHTML='Estás en el plan <b>Free</b>. Mejóralo cuando quieras para más productos, sucursales y funciones.';
    actions.innerHTML='<a class="btn btn-primary" href="index.html#plans">Ver planes y mejorar</a>'
      +'<a class="btn btn-ghost" href="index.html">Volver al inicio</a>';
  }else{
    var canceled=sub&&sub.cancel_at_period_end;
    var end=sub&&sub.current_period_end?sub.current_period_end:null;
    if(canceled){
      $('statusPill').textContent='Termina pronto';
      $('planMsg').innerHTML='Tu plan <b>'+esc(PLAN_NAME[plan])+'</b> sigue activo, pero está programado para terminar. Al vencer pasas al plan Free.';
      $('dateLabel').textContent='Termina el';
    }else{
      $('statusPill').textContent='Activo';
      $('planMsg').innerHTML='Tu plan <b>'+esc(PLAN_NAME[plan])+'</b> está activo. Gracias por confiar en Tiketes.';
      $('dateLabel').textContent='Se renueva el';
    }
    if(end){$('detailBlock').style.display='';$('dateVal').textContent=fmtDate(end);}
    actions.innerHTML='<a class="btn btn-primary" href="'+portalUrl+'" target="_blank" rel="noopener">Administrar o cancelar mi plan</a>'
      +'<a class="btn btn-ghost" href="index.html#plans">Cambiar de plan</a>'
      +'<a class="btn btn-ghost" href="index.html">Volver al inicio</a>';
    $('planMsg').innerHTML+=' <span style="color:rgba(255,255,255,.5)">Puedes cambiar de plan o cancelar cuando quieras — te llevamos a Polar para hacerlo seguro.</span>';
  }

  $('loading').style.display='none';
  $('content').style.display='';
})();
</script>
<!-- Cloudflare Web Analytics (sin cookies) --><script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "3535288e08fe4b08ac9c4b4633385ee7"}'></script>
</body>
</html>
